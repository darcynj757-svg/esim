kind = "web"
previewPath = "/"
title = "FinTech PWA"
version = "1.0.0"
id = "artifacts/fintech-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20019

[services.development]
run = "pnpm --filter @workspace/fintech-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintech-app", "run", "build" ]
publicDir = "artifacts/fintech-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20019"
BASE_PATH = "/"
